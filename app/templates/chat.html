{% extends "base.html" %}
{% block title %}AI 聊天室{% endblock %}
{% block content %}
<div class="container" style="max-width: 1000px; display: flex; gap: 2rem; height: calc(100vh - 200px);">
    <!-- Sidebar for Sessions -->
    <div class="card" style="flex: 1; border-radius: 12px; padding: 1.5rem; overflow-y: auto;">
        <h3 style="margin-bottom: 1.5rem; color: var(--color-primary);"><i class="fa-solid fa-comments"></i> 歷史記錄</h3>
        <button id="new-chat-btn" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed var(--color-primary); background: none; color: var(--color-primary); cursor: pointer; margin-bottom: 1rem;">
            + 開啟新對話
        </button>
        <div id="session-list" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <!-- Sessions will be loaded here -->
        </div>
    </div>

    <!-- Chat Area -->
    <div class="card" style="flex: 2; border-radius: 12px; padding: 2rem; display: flex; flex-direction: column;">
        <div id="chat-header" style="border-bottom: 1px solid var(--color-border); padding-bottom: 1rem; margin-bottom: 1rem;">
            <h2 id="chat-title" style="font-size: 1.2rem; color: var(--color-text);">請選擇一個對話或開始新對話</h2>
        </div>

        <div id="chat-window" style="flex-grow: 1; overflow-y: auto; padding: 1rem; background: #fafafa; border-radius: 12px; margin-bottom: 1.5rem;">
            <div id="messages" style="display: flex; flex-direction: column; gap: 1rem;">
                <p style="text-align: center; color: var(--color-text_light);">快來跟雪音老師聊天吧！(๑•̀ㅂ•́)و✧</p>
            </div>
        </div>

        <div id="input-area" style="display: flex; gap: 10px;">
            <input type="text" id="chat-input" placeholder="輸入訊息..." style="flex-grow: 1; padding: 15px; border-radius: 10px; border: 1px solid var(--color-border); outline: none;">
            <button id="send-chat-btn" style="background-color: var(--color-primary); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold;">
                發送
            </button>
        </div>
    </div>
</div>

<script>
    let activeSessionId = null;
    const sessionList = document.getElementById('session-list');
    const messagesContainer = document.getElementById('messages');
    const chatInput = document.getElementById('chat-input');
    const chatTitle = document.getElementById('chat-title');

    async function loadSessions() {
        // Try server first
        try {
            const res = await fetch("{{ url_for('study.get_chat_sessions') }}");
            if (res.ok) {
                const sessions = await res.json();
                renderSessions(sessions);
                // Backup to LocalStorage
                localStorage.setItem('chat_sessions_backup', JSON.stringify(sessions));
                return;
            }
        } catch (e) { console.log("Server session load failed, using local backup."); }
        
        // Fallback to LocalStorage
        const localSessions = JSON.parse(localStorage.getItem('chat_sessions_backup') || '[]');
        renderSessions(localSessions);
    }

    function renderSessions(sessions) {
        sessionList.innerHTML = '';
        sessions.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'session-item';
            btn.style.textAlign = 'left';
            btn.style.padding = '10px';
            btn.style.border = '1px solid var(--color-border)';
            btn.style.background = s.id === activeSessionId ? '#eee' : 'white';
            btn.style.borderRadius = '8px';
            btn.style.cursor = 'pointer';
            btn.innerHTML = `<div style="font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${s.title}</div><div style="font-size: 0.7rem; color: #999;">${new Date(s.created_at).toLocaleString()}</div>`;
            btn.onclick = () => loadHistory(s.id, s.title);
            sessionList.appendChild(btn);
        });
    }

    async function loadHistory(id, title) {
        activeSessionId = id;
        chatTitle.innerText = title;
        messagesContainer.innerHTML = '';
        
        try {
            const res = await fetch(`{{ url_for('study.get_chat_history', session_id=0) }}`.replace('0', id));
            if (res.ok) {
                const data = await res.json();
                data.messages.forEach(m => addMessage(m.role, m.content));
                // Backup messages
                localStorage.setItem(`chat_history_${id}`, JSON.stringify(data.messages));
                return;
            }
        } catch (e) { console.log("Server history load failed, using local backup."); }

        // Fallback
        const localHistory = JSON.parse(localStorage.getItem(`chat_history_${id}`) || '[]');
        localHistory.forEach(m => addMessage(m.role, m.content));
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.style.padding = '12px 18px';
        div.style.borderRadius = '15px';
        div.style.maxWidth = '85%';
        div.style.lineHeight = '1.6';
        
        if (role === 'ai') {
            div.style.backgroundColor = '#fff';
            div.style.border = '1px solid var(--color-border)';
            div.style.alignSelf = 'flex-start';
            div.innerHTML = `<small style="color: var(--color-accent);">雪音老師</small><br>${text.replace(/\n/g, '<br>')}`;
        } else {
            div.style.backgroundColor = 'var(--color-primary)';
            div.style.color = 'white';
            div.style.alignSelf = 'flex-end';
            div.innerHTML = text;
        }
        messagesContainer.appendChild(div);
        messagesContainer.parentElement.scrollTop = messagesContainer.parentElement.scrollHeight;
    }

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;
        
        chatInput.value = '';
        addMessage('user', text);

        // Prepare context from LocalStorage if session is unstable
        const currentLocalHistory = JSON.parse(localStorage.getItem(`chat_history_${activeSessionId}`) || '[]');
        const geminiHistory = currentLocalHistory.map(m => ({role: m.role, parts: [m.content]}));
        
        const payload = {
            message: text, 
            session_id: activeSessionId,
            history: geminiHistory // Sending full history as backup
        };

        try {
            const response = await fetch("{{ url_for('study.tutor_chat') }}", {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content},
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            if (data.reply) {
                if (!activeSessionId) {
                    activeSessionId = data.session_id;
                    loadSessions();
                }
                addMessage('ai', data.reply);
                
                // Save to local backup
                const updatedHistory = [...currentLocalHistory, {role: 'user', content: text}, {role: 'ai', content: data.reply}];
                localStorage.setItem(`chat_history_${activeSessionId}`, JSON.stringify(updatedHistory));
            }
        } catch (e) {
            addMessage('ai', '對不起，連線似乎有點問題...但我會記住剛才的對話。');
        }
    }

    document.getElementById('send-chat-btn').addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {if (e.key === 'Enter') sendMessage();});
    document.getElementById('new-chat-btn').addEventListener('click', () => {
        activeSessionId = null;
        chatTitle.innerText = "新對話";
        messagesContainer.innerHTML = '<p style="text-align: center; color: var(--color-text_light);">請輸入第一則訊息...</p>';
    });

    loadSessions();
</script>

<style>
    .session-item:hover {
        border-color: var(--color-primary) !important;
        transform: scale(1.02);
        transition: all 0.2s;
    }
</style>
{% endblock %}
