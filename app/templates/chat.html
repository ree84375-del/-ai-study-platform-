{% extends "base.html" %}
{% block title %}AI 聊天室{% endblock %}
{% block content %}
<div class="chat-container">
    <!-- Sidebar for Sessions -->
    <div class="chat-sidebar card">
        <h3 style="margin-bottom: 1.5rem; color: var(--color-primary);"><i class="fa-solid fa-comments"></i> 歷史記錄</h3>
        <button id="new-chat-btn"
            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed var(--color-primary); background: none; color: var(--color-primary); cursor: pointer; margin-bottom: 1rem; transition: all 0.2s;">
            + 開啟新對話
        </button>
        <div id="session-list" style="display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto;">
            <!-- Sessions will be loaded here -->
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-main card">
        <div id="chat-header"
            style="border-bottom: 1px solid var(--color-border); padding-bottom: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="chat-title" style="font-size: 1.2rem; color: var(--color-text); display: flex; align-items: center; margin: 0;">
                <img src="{{ url_for('static', filename='img/yukine_lofi.png') }}" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 8px; border: 1px solid rgba(0,0,0,0.1);"> 請選擇一個對話或開始新對話
            </h2>
            <button id="toggle-voice-btn" class="btn btn-sm" style="background: rgba(133, 163, 146, 0.1); color: var(--color-accent); border: 1px solid var(--color-accent); border-radius: 20px; transition: all 0.3s;">
                <i class="fa-solid fa-volume-xmark"></i> 語音朗讀關閉
            </button>
        </div>

        <div id="chat-window"
            style="flex-grow: 1; overflow-y: auto; padding: 1rem; background: #fafafa; border-radius: 12px; margin-bottom: 1.5rem;">
            <div id="messages" style="display: flex; flex-direction: column; gap: 1rem;">
                <p style="text-align: center; color: var(--color-text_light);">快來跟雪音老師聊天吧！(๑•̀ㅂ•́)و✧</p>
            </div>
        </div>

        <div id="input-area" style="display: flex; gap: 10px; align-items: center;">
            <button id="voice-input-btn" title="語音輸入"
                style="background: none; border: 1px solid var(--color-border); color: var(--color-text_light); padding: 10px; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; transition: all 0.2s;">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <input type="text" id="chat-input" placeholder="輸入訊息..."
                style="flex-grow: 1; padding: 15px; border-radius: 10px; border: 1px solid var(--color-border); outline: none;">
            <button id="send-chat-btn"
                style="background-color: var(--color-primary); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; height: 45px;">
                發送
            </button>
        </div>
    </div>
</div>

<script>
    // --- Voice Tutor Logic ---
    const voiceBtn = document.getElementById('voice-input-btn');
    const toggleVoiceBtn = document.getElementById('toggle-voice-btn');
    const chatInput = document.getElementById('chat-input');
    let isListening = false;
    let autoSpeak = false; // Tracks if voice output is globally enabled by user
    let activeSessionId = null;
    const sessionList = document.getElementById('session-list');
    const chatTitle = document.getElementById('chat-title');
    const messagesContainer = document.getElementById('messages');
    let selectedVoice = null;

    // Load available voices
    function initVoices() {
        // Find cute Japanese or Chinese voices
        const voices = window.speechSynthesis.getVoices();
        // Priority: Microsoft Xiaoxiao (Very natural Chinese/English), then specific Japanese female voices, then generic Japanese
        selectedVoice = voices.find(v => v.name.includes('Xiaoxiao') || v.name.includes('Hsiao'))
                     || voices.find(v => v.name.includes('Haruka') || v.name.includes('Nanami') || v.name.includes('Sayaka'))
                     || voices.find(v => v.lang.includes('ja-JP') && (v.name.includes('Female') || v.name.includes('Google')))
                     || voices.find(v => v.lang.includes('zh') && (v.name.includes('Yating') || v.name.includes('female'))) 
                     || voices.find(v => v.lang.includes('zh-TW'))
                     || voices.find(v => v.lang.includes('ja-JP'));
    }
    if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = initVoices;
    }
    initVoices();

    // Toggle Voice Output
    toggleVoiceBtn.addEventListener('click', () => {
        autoSpeak = !autoSpeak;
        if (autoSpeak) {
            toggleVoiceBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i> 語音朗讀開啟';
            toggleVoiceBtn.style.background = 'var(--color-accent)';
            toggleVoiceBtn.style.color = 'white';
        } else {
            toggleVoiceBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i> 語音朗讀關閉';
            toggleVoiceBtn.style.background = 'rgba(133, 163, 146, 0.1)';
            toggleVoiceBtn.style.color = 'var(--color-accent)';
            window.speechSynthesis.cancel();
        }
    });

    // Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = false;

        recognition.onstart = () => {
            isListening = true;
            voiceBtn.style.color = 'white';
            voiceBtn.style.backgroundColor = '#ff6b6b';
            voiceBtn.style.borderColor = '#ff6b6b';
            voiceBtn.style.boxShadow = '0 0 15px rgba(255, 107, 107, 0.5)';
            voiceBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
        };

        recognition.onend = () => {
            isListening = false;
            voiceBtn.style.color = 'var(--color-text_light)';
            voiceBtn.style.backgroundColor = 'transparent';
            voiceBtn.style.borderColor = 'var(--color-border)';
            voiceBtn.style.boxShadow = 'none';
            voiceBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            chatInput.value = transcript;
            sendMessage();
        };

        voiceBtn.onclick = () => {
            if (isListening) recognition.stop();
            else recognition.start();
        };
    } else {
        voiceBtn.style.display = 'none';
    }

    // Text to Speech
    function speak(text) {
        if (!window.speechSynthesis || !autoSpeak) return;
        window.speechSynthesis.cancel();
        
        let cleanText = text.replace(/\[DRAW:.*?\]/g, '')
                            .replace(/\*\*/g, '')
                            .replace(/\*/g, '')
                            .replace(/#/g, '')
                            .replace(/\(^_^\)b|\(\*\^▽\^\*\)|\(๑•̀ㅂ•́\)و✧/g, ''); 

        const utterance = new SpeechSynthesisUtterance(cleanText);
        // Multilingual cute girl aura (pitch up, speed slightly up)
        utterance.pitch = 1.6;
        utterance.rate = 1.1; 
        
        if (selectedVoice) {
            utterance.voice = selectedVoice;
            utterance.lang = selectedVoice.lang; // Match the selected voice's engine
        } else {
            utterance.lang = 'zh-TW';
        }
        
        window.speechSynthesis.speak(utterance);
    }
    // --- End Voice Logic ---

    async function loadSessions() {
        try {
            const res = await fetch("{{ url_for('study.get_chat_sessions') }}");
            if (res.ok) {
                const sessions = await res.json();
                renderSessions(sessions);
                localStorage.setItem('chat_sessions_backup', JSON.stringify(sessions));
                return;
            }
        } catch (e) { console.log("Server session load failed, using local backup."); }

        const localSessions = JSON.parse(localStorage.getItem('chat_sessions_backup') || '[]');
        renderSessions(localSessions);
    }

    function renderSessions(sessions) {
        sessionList.innerHTML = '';
        sessions.forEach(s => {
            const btn = document.createElement('button');
            btn.className = `session-item ${s.id === activeSessionId ? 'active' : ''}`;
            btn.innerHTML = `
                <div style="font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: ${s.id === activeSessionId ? 'white' : 'var(--color-text)'};">
                    ${s.title}
                </div>
                <div style="font-size: 0.75rem; color: ${s.id === activeSessionId ? 'rgba(255,255,255,0.8)' : '#999'}; margin-top: 4px;">
                    ${new Date(s.created_at).toLocaleString([], { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}
                </div>
            `;
            btn.onclick = () => loadHistory(s.id, s.title);
            sessionList.appendChild(btn);
        });
    }

    async function loadHistory(id, title) {
        activeSessionId = id;
        chatTitle.innerHTML = `<img src="{{ url_for('static', filename='img/yukine_lofi.png') }}" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 8px; vertical-align: middle; border: 1px solid rgba(0,0,0,0.1);"> ${title}`;
        messagesContainer.innerHTML = '';
        loadSessions(); // Update active state in sidebar

        try {
            const res = await fetch(`{{ url_for('study.get_chat_history', session_id=0) }}`.replace('0', id));
            if (res.ok) {
                const data = await res.json();
                data.messages.forEach(m => addMessage(m.role, m.content, false));
                localStorage.setItem(`chat_history_${id}`, JSON.stringify(data.messages));
                scrollToBottom();
                return;
            }
        } catch (e) { console.log("Server history load failed, using local backup."); }

        const localHistory = JSON.parse(localStorage.getItem(`chat_history_${id}`) || '[]');
        localHistory.forEach(m => addMessage(m.role, m.content, false));
        scrollToBottom();
    }

    function addMessage(role, text, animate = true) {
        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        wrapper.style.marginBottom = '1.2rem';
        wrapper.style.alignItems = role === 'ai' ? 'flex-start' : 'flex-end';

        const div = document.createElement('div');
        div.className = `chat-bubble ${role}`;
        if (animate) {
            div.style.animation = 'popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards';
        }

        if (role === 'ai') {
            const labelContainer = document.createElement('div');
            labelContainer.style.display = 'flex';
            labelContainer.style.alignItems = 'center';
            labelContainer.style.marginBottom = '6px';
            labelContainer.style.marginLeft = '8px';
            
            const avatar = document.createElement('img');
            avatar.src = "{{ url_for('static', filename='img/yukine_lofi.png') }}";
            avatar.style.width = '24px';
            avatar.style.height = '24px';
            avatar.style.borderRadius = '50%';
            avatar.style.objectFit = 'cover';
            avatar.style.marginRight = '8px';
            avatar.style.border = '1px solid rgba(0,0,0,0.1)';
            avatar.onerror = function() { this.style.display='none'; };

            const label = document.createElement('div');
            label.innerHTML = '<i class="fa-solid fa-sparkles"></i> 雪音老師';
            label.style.fontSize = '0.8rem';
            label.style.color = '#666';
            label.style.fontWeight = 'bold';
            
            labelContainer.appendChild(avatar);
            labelContainer.appendChild(label);
            wrapper.appendChild(labelContainer);

            // Format line breaks
            div.innerHTML = text.replace(/\n/g, '<br>');
        } else {
            div.innerHTML = text;
        }

        wrapper.appendChild(div);
        messagesContainer.appendChild(wrapper);
        scrollToBottom();
        return wrapper;
    }

    function showTypingIndicator() {
        const wrapper = document.createElement('div');
        wrapper.id = 'typing-indicator';
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        wrapper.style.alignItems = 'flex-start';
        wrapper.style.marginBottom = '1.2rem';

        const label = document.createElement('div');
        label.innerHTML = '<i class="fa-solid fa-pen-fancy"></i> 雪音正在輸入...';
        label.style.fontSize = '0.75rem';
        label.style.color = '#888';
        label.style.marginBottom = '4px';
        label.style.marginLeft = '12px';

        const div = document.createElement('div');
        div.className = 'chat-bubble ai typing';
        div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

        wrapper.appendChild(label);
        wrapper.appendChild(div);
        messagesContainer.appendChild(wrapper);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) indicator.remove();
    }

    function scrollToBottom() {
        const chatWindow = document.getElementById('chat-window');
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        chatInput.value = '';
        addMessage('user', text);
        showTypingIndicator();

        const currentLocalHistory = JSON.parse(localStorage.getItem(`chat_history_${activeSessionId}`) || '[]');
        const geminiHistory = currentLocalHistory.map(m => ({ role: m.role, parts: [m.content] }));

        const payload = {
            message: text,
            session_id: activeSessionId,
            history: geminiHistory
        };

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000); // 60s timeout

            const response = await fetch("{{ url_for('study.tutor_chat') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content
                },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            if (!response.ok) {
                removeTypingIndicator();
                const errText = await response.text();
                console.error("Server Error:", response.status, errText);
                addMessage('ai', `伺服器回傳錯誤 (${response.status})，請稍後再試。`);
                return;
            }

            const data = await response.json();
            removeTypingIndicator();

            if (data.reply) {
                if (!activeSessionId) {
                    activeSessionId = data.session_id;
                    loadSessions();
                    chatTitle.innerHTML = `<img src="{{ url_for('static', filename='img/yukine_lofi.png') }}" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 8px; vertical-align: middle; border: 1px solid rgba(0,0,0,0.1);"> 新對話`;
                }
                addMessage('ai', data.reply);

                if (autoSpeak) {
                    speak(data.reply);
                }

                const updatedHistory = [...currentLocalHistory, { role: 'user', content: text }, { role: 'ai', content: data.reply }];
                localStorage.setItem(`chat_history_${activeSessionId}`, JSON.stringify(updatedHistory));
            } else if (data.error) {
                addMessage('ai', `發生問題：${data.error}`);
            }
        } catch (e) {
            removeTypingIndicator();
            console.error("Chat Error:", e);
            if (e.name === 'AbortError') {
                addMessage('ai', '回應超時了，AI 老師可能在思考比較久的問題，請稍後再試！');
            } else {
                addMessage('ai', '對不起，連線似乎有點問題...請確認伺服器是否正在運行。');
            }
        }
    }

    document.getElementById('send-chat-btn').addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    document.getElementById('new-chat-btn').addEventListener('click', () => {
        activeSessionId = null;
        chatTitle.innerHTML = `<img src="{{ url_for('static', filename='img/yukine_lofi.png') }}" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 8px; vertical-align: middle; border: 1px solid rgba(0,0,0,0.1);"> 新對話`;
        messagesContainer.innerHTML = `
            <div style="text-align: center; margin-top: 50px; animation: popIn 0.5s ease;">
                <img src="{{ url_for('static', filename='img/yukine_lofi.png') }}" style="width: 120px; border-radius: 50%; object-fit: cover; opacity: 0.9; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);" onerror="this.style.display='none'">
                <h3 style="color: var(--color-primary); margin-bottom: 10px;">你好 {{ current_user.username }}，我是雪音！</h3>
                <p style="color: var(--color-text_light);">
                    {% if current_user.learning_goals %}
                    我記得你的學習目標是：<strong>{{ current_user.learning_goals }}</strong>！<br>
                    {% endif %}
                    有任何課業問題、想聊聊讀書心法，或單純想找人說說話，都可以告訴我喔！(๑•̀ㅂ•́)و✧
                </p>
            </div>
        `;
        loadSessions(); // update sidebar selection
    });

    // Initial setup
    chatInput.focus();
    loadSessions();
</script>

<style>
    /* Sidebar styling */
    .session-item {
        padding: 12px 15px;
        border: 2px solid transparent;
        background: white;
        border-radius: 12px;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s ease;
        margin-bottom: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
    }

    .session-item:hover {
        border-color: rgba(67, 97, 238, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .session-item.active {
        background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
        border-color: transparent;
        color: white;
        box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
    }

    /* Chat Bubble Styling */
    .chat-bubble {
        padding: 14px 20px;
        border-radius: 20px;
        max-width: 80%;
        line-height: 1.6;
        position: relative;
        font-size: 1.05rem;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
    }

    .chat-bubble.user {
        background: linear-gradient(135deg, var(--color-primary), #3a56d4);
        color: white;
        border-bottom-right-radius: 4px;
    }

    .chat-bubble.ai {
        background: white;
        color: var(--color-text);
        border: 1px solid rgba(0, 0, 0, 0.05);
        border-bottom-left-radius: 4px;
    }

    /* Typing Animation */
    .typing .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: var(--color-primary);
        margin: 0 3px;
        animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing .dot:nth-child(1) {
        animation-delay: -0.32s;
    }

    .typing .dot:nth-child(2) {
        animation-delay: -0.16s;
    }

    @keyframes typingBounce {

        0%,
        80%,
        100% {
            transform: scale(0);
            opacity: 0.5;
        }

        40% {
            transform: scale(1);
            opacity: 1;
        }
    }

    @keyframes popIn {
        0% {
            transform: scale(0.95) translateY(10px);
            opacity: 0;
        }

        100% {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
    }

    /* Input Area Focus Effect */
    #chat-input:focus {
        border-color: var(--color-primary) !important;
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
    }

    /* Scrollbar for chat window */
    #chat-window::-webkit-scrollbar {
        width: 6px;
    }

    #chat-window::-webkit-scrollbar-track {
        background: transparent;
    }

    #chat-window::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
    }

    #chat-window::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2);
    }

    /* Responsive Chat Layout */
    .chat-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 1rem;
        display: flex;
        gap: 2rem;
        height: calc(100vh - 120px);
    }

    .chat-sidebar {
        flex: 1;
        min-width: 280px;
        max-width: 350px;
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255,255,255,0.6);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
    }

    .chat-main {
        flex: 3;
        border-radius: 12px;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255,255,255,0.6);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    @media (max-width: 992px) {
        .chat-container {
            flex-direction: column;
            height: auto;
            min-height: calc(100vh - 120px);
        }
        .chat-sidebar {
            flex: none;
            max-width: 100%;
            height: 250px; /* Constrain height on mobile */
        }
        .chat-main {
            height: 600px; /* Fixed height for chat area on mobile to enable scrolling within */
        }
    }
</style>
{% endblock %}
