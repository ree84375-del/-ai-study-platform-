{% extends "base.html" %}
{% block title %}{{ _t('vision_title') }}{% endblock %}
{% block content %}
<div class="container" style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
    <h2 style="color: var(--color-primary); margin-bottom: 2rem; border-bottom: 2px solid var(--color-border); padding-bottom: 0.5rem;"><i class="fa-solid fa-camera"></i> {{ _t('vision_header') }}</h2>
    
    <div class="washi-card" style="text-align: center;">
        <div id="upload-section">
            <p style="color: var(--color-text_light); margin-bottom: 2rem;">{{ _t('vision_prompt') }}</p>
            
            <form id="upload-form" style="margin-bottom: 2rem;">
                <div style="border: 2px dashed var(--color-border); border-radius: 12px; padding: 3rem; background-color: var(--color-bg); margin-bottom: 1.5rem; transition: border-color 0.3s;" id="drop-zone">
                    <i class="fa-solid fa-cloud-arrow-up" style="font-size: 3rem; color: var(--color-text_light); margin-bottom: 1rem;"></i><br>
                    <label for="image-upload" style="cursor: pointer; color: var(--color-primary); font-weight: bold; text-decoration: underline;">{{ _t('click_to_upload') }}</label> {{ _t('or_drag_drop') }}
                    <input type="file" id="image-upload" name="image" accept="image/*" style="display: none;">
                    <p id="file-name" style="margin-top: 10px; font-size: 0.9rem; color: var(--color-text_main);"></p>
                </div>
                
                <button type="submit" id="analyze-btn" style="background-color: var(--color-primary); color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; transition: opacity 0.3s;" disabled>
                    {{ _t('ask_ai_btn') }} <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </form>
        </div>

        <div id="loading" style="display: none; color: var(--color-text_main); padding: 3rem 0;">
            <div class="typing-indicator" style="margin-bottom: 1.5rem;">
                <span></span><span></span><span></span>
            </div>
            <p style="font-size: 1.1rem; font-weight: bold; color: var(--color-primary); animation: pulse_text 1.5s infinite;">{{ _t('loading_vision') }}</p>
            <style>
                .typing-indicator {
                    display: inline-flex;
                    align-items: center;
                    gap: 8px;
                }
                .typing-indicator span {
                    display: block;
                    width: 15px;
                    height: 15px;
                    background-color: var(--color-primary);
                    border-radius: 50%;
                    animation: bounce_dots 1.4s infinite ease-in-out both;
                }
                .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
                .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
                @keyframes bounce_dots {
                    0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
                    40% { transform: scale(1); opacity: 1; }
                }
                @keyframes pulse_text {
                    0% { opacity: 0.6; }
                    50% { opacity: 1; text-shadow: 0 0 10px rgba(114, 9, 183, 0.3); }
                    100% { opacity: 0.6; }
                }
            </style>
        </div>

        <div id="chat-container" style="display: none; text-align: left; background-color: white; border: 1px solid var(--color-border); border-radius: 8px; padding: 1.5rem; margin-top: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div id="chat-messages" style="max-height: 400px; overflow-y: auto; margin-bottom: 1.5rem; padding: 10px; background: #fafafa; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem;">
                <!-- Messages will appear here -->
            </div>
            
            <div id="follow-up-section" style="border-top: 1px solid var(--color-border); padding-top: 1rem;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="follow-up-input" placeholder="{{ _t('follow_up_placeholder') }}" style="flex-grow: 1; padding: 12px; border: 1px solid var(--color-border); border-radius: 5px; outline: none;">
                    <button id="send-btn" style="background-color: var(--color-accent); color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer;">
                        {{ _t('send_btn') }} <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <button onclick="location.reload()" style="margin-top: 1rem; background: none; border: none; color: var(--color-text_light); text-decoration: underline; cursor: pointer; font-size: 0.9rem;">
                    {{ _t('upload_new') }}
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentSessionId = null;
    const fileInput = document.getElementById('image-upload');
    const fileNameDisplay = document.getElementById('file-name');
    const analyzeBtn = document.getElementById('analyze-btn');
    const chatMessages = document.getElementById('chat-messages');

    fileInput.addEventListener('change', function() {
        if(this.files && this.files.length > 0) {
            fileNameDisplay.innerText = "{{ _t('file_selected') }}" + this.files[0].name;
            analyzeBtn.disabled = false;
        }
    });

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.style.padding = '12px 18px';
        div.style.borderRadius = '15px';
        div.style.maxWidth = '85%';
        div.style.lineHeight = '1.6';
        
        if (role === 'ai') {
            div.style.backgroundColor = '#f1f1f1';
            div.style.alignSelf = 'flex-start';
            div.innerHTML = `<strong>{{ _t("nav_yukine") }}：</strong><br>${text.replace(/\n/g, '<br>')}`;
        } else {
            div.style.backgroundColor = 'var(--color-primary)';
            div.style.color = 'white';
            div.style.alignSelf = 'flex-end';
            div.innerHTML = `<strong>{{ _t("me_name") }}</strong><br>${text}`;
        }
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    document.getElementById('upload-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const uploadSection = document.getElementById('upload-section');
        const loadingSection = document.getElementById('loading');
        const chatContainer = document.getElementById('chat-container');
        
        uploadSection.style.display = 'none';
        loadingSection.style.display = 'block';

        fetch("{{ url_for('study.ai_vision') }}", {
            method: 'POST',
            headers: {'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content},
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            loadingSection.style.display = 'none';
            chatContainer.style.display = 'block';
            
            if(data.error) {
                addMessage('ai', "{{ _t('vision_error') }}" + data.error);
            } else {
                currentSessionId = data.session_id;
                addMessage('ai', data.result);
            }
        })
        .catch(err => {
            loadingSection.style.display = 'none';
            chatContainer.style.display = 'block';
            addMessage('ai', "{{ _t('vision_conn_error') }}");
        });
    });

    async function sendFollowUp() {
        const input = document.getElementById('follow-up-input');
        const text = input.value.trim();
        if (!text || !currentSessionId) return;
        
        input.value = '';
        addMessage('user', text);
        
        const response = await fetch("{{ url_for('study.tutor_chat') }}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content},
            body: JSON.stringify({message: text, session_id: currentSessionId})
        });
        
        const data = await response.json();
        if (data.reply) {
            addMessage('ai', data.reply);
        }
    }

    document.getElementById('send-btn').addEventListener('click', sendFollowUp);
    document.getElementById('follow-up-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendFollowUp();
    });
</script>
{% endblock %}
