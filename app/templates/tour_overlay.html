<!-- Site Tour Overlay -->
<div id="site-tour-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div class="washi-card" style="max-width: 600px; width: 90%; position: relative; padding: 30px; animation: slideIn 0.5s ease-out;">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="fa-solid fa-map-location-dot" style="font-size: 3rem; color: var(--color-primary); margin-bottom: 10px;"></i>
            <h2 style="color: var(--color-text_main); margin: 0;">{{ _t('tour_welcome') }}</h2>
            <p style="color: var(--color-text_light);">{{ _t('tour_subtitle') }}</p>
        </div>
        
        <div class="tour-steps">
            <div class="tour-step active" id="step-1">
                <h4 style="color: var(--color-secondary);"><i class="fa-solid fa-pen-nib"></i> {{ _t('step1_h4') }}</h4>
                <p>{{ _t('step1_p') }}</p>
            </div>
            
            <div class="tour-step" id="step-2" style="display: none;">
                <h4 style="color: var(--color-secondary);"><i class="fa-solid fa-wand-magic-sparkles"></i> {{ _t('step2_h4') }}</h4>
                <p>{{ _t('step2_p') }}</p>
            </div>
            
            <div class="tour-step" id="step-3" style="display: none;">
                <h4 style="color: var(--color-secondary);"><i class="fa-solid fa-users"></i> {{ _t('step3_h4') }}</h4>
                <p>{{ _t('step3_p') }}</p>
            </div>
            
            <div class="tour-step" id="step-4" style="display: none;">
                <h4 style="color: var(--color-secondary);"><i class="fa-solid fa-user-shield"></i> {{ _t('step4_h4') }}</h4>
                <p>{{ _t('step4_p') }}</p>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid var(--color-border); padding-top: 20px;">
            <button id="tour-prev" class="btn" style="background-color: transparent; border: 1px solid var(--color-primary); color: var(--color-primary); display: none;">{{ _t('tour_prev') }}</button>
            <div style="flex-grow: 1; display: flex; justify-content: center; align-items: center;" id="tour-dots">
                <span class="dot" style="height: 8px; width: 8px; margin: 0 4px; background-color: var(--color-primary); border-radius: 50%; display: inline-block;"></span>
                <span class="dot" style="height: 8px; width: 8px; margin: 0 4px; background-color: var(--color-border); border-radius: 50%; display: inline-block;"></span>
                <span class="dot" style="height: 8px; width: 8px; margin: 0 4px; background-color: var(--color-border); border-radius: 50%; display: inline-block;"></span>
                <span class="dot" style="height: 8px; width: 8px; margin: 0 4px; background-color: var(--color-border); border-radius: 50%; display: inline-block;"></span>
            </div>
            <button id="tour-next" class="btn btn-primary" style="background-color: var(--color-primary); color: white;">{{ _t('tour_next') }}</button>
            <button id="tour-finish" class="btn" style="background-color: var(--color-accent); color: white; display: none;">{{ _t('tour_finish') }}</button>
        </div>
    </div>
</div>

<style>
    @keyframes slideIn {
        from { transform: translateY(-50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let currentStep = 1;
        const totalSteps = 4;
        
        const nextBtn = document.getElementById('tour-next');
        const prevBtn = document.getElementById('tour-prev');
        const finishBtn = document.getElementById('tour-finish');
        const dots = document.querySelectorAll('#tour-dots .dot');

        function updateTourUI() {
            // Hide all steps
            for(let i=1; i<=totalSteps; i++) {
                document.getElementById('step-' + i).style.display = 'none';
            }
            // Show current step
            document.getElementById('step-' + currentStep).style.display = 'block';
            
            // Update dots
            dots.forEach((dot, index) => {
                if (index === currentStep - 1) {
                    dot.style.backgroundColor = 'var(--color-primary)';
                } else {
                    dot.style.backgroundColor = 'var(--color-border)';
                }
            });

            // Update buttons
            if (currentStep === 1) {
                prevBtn.style.display = 'none';
            } else {
                prevBtn.style.display = 'block';
            }
            
            if (currentStep === totalSteps) {
                nextBtn.style.display = 'none';
                finishBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                finishBtn.style.display = 'none';
            }
        }

        nextBtn.addEventListener('click', () => {
            if (currentStep < totalSteps) {
                currentStep++;
                updateTourUI();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 1) {
                currentStep--;
                updateTourUI();
            }
        });

        finishBtn.addEventListener('click', () => {
            // Send API call to mark tour as seen
            fetch('/api/complete_tour', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                }
            }).then(() => {
                document.getElementById('site-tour-overlay').style.display = 'none';
            }).catch(err => {
                console.error('Failed to complete tour', err);
                document.getElementById('site-tour-overlay').style.display = 'none';
            });
        });
    });
</script>
