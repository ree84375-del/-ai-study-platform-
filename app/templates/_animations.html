<style>
/* CSS Animations for High-Fidelity Images */

/* Growing effect for the Bonsai container */
.bonsai-grow {
    animation: growTree 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    transform-origin: bottom center;
}
@keyframes growTree {
    0% {
        clip-path: inset(100% 0 0 0); /* Hide everything from bottom up */
        transform: scale(0.85) translateY(20px);
        opacity: 0;
    }
    100% {
        clip-path: inset(0 0 0 0);
        transform: scale(1) translateY(0);
        opacity: 1;
    }
}

/* Glowing breathing effect for Max Sakura */
.sakura-glow {
    animation: breatheGlow 3s ease-in-out infinite alternate;
}
@keyframes breatheGlow {
    from { box-shadow: 0 5px 15px rgba(255,183,197,0.4); }
    to { box-shadow: 0 5px 30px rgba(255,183,197,0.8); }
}

/* Daruma Animations */
.daruma-wobble-drop {
    animation: darumaDrop 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    transform-origin: bottom center;
}
@keyframes darumaDrop {
    0% { transform: translateY(-50px) rotate(15deg); opacity: 0; }
    50% { transform: translateY(0) rotate(-5deg); opacity: 1; }
    75% { transform: translateY(-5px) rotate(2deg); }
    100% { transform: translateY(0) rotate(0deg); }
}

.daruma-wobble-idle {
    animation: wobbleIdle 5s ease-in-out infinite alternate;
    transform-origin: bottom center;
}
@keyframes wobbleIdle {
    0%, 100% { transform: rotate(0deg); }
    33% { transform: rotate(2deg); }
    66% { transform: rotate(-2deg); }
}

/* Falling Petals CSS */
.petal-container {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    overflow: hidden;
    pointer-events: none;
    border-radius: 50%;
    z-index: 10;
}
.petal {
    position: absolute;
    background: radial-gradient(#fff, #ffb7c5);
    border-radius: 15px 0 15px 0;
    opacity: 0.8;
    pointer-events: none;
    animation: fall linear forwards;
    box-shadow: 0 0 5px rgba(255,183,197,0.5);
}
@keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% {
        transform: translateY(200px) rotate(720deg) translateX(20px);
        opacity: 0;
    }
}
</style>

<script>
function renderBonsai(streak, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    let imgSrc = '';
    let extraClass = '';
    let size = containerId === 'demo-bonsai' ? '180px' : '100px';
    let border = '';
    let needsPetals = false;
    
    if (streak === 0) {
        imgSrc = "{{ url_for('static', filename='img/zen_rock.png') }}";
        border = "3px solid #ddd";
        extraClass = "fade-in-anim"; 
    } else if (streak >= 1 && streak < 7) {
        imgSrc = "{{ url_for('static', filename='img/green_bonsai.png') }}";
        border = "3px solid #85a392";
        extraClass = "bonsai-grow"; // Dynamic growing
    } else {
        imgSrc = "{{ url_for('static', filename='img/sakura_fuji.png') }}";
        border = "4px solid #ffb7c5";
        extraClass = "bonsai-grow sakura-glow"; // Dynamic growing + glow
        needsPetals = true;
    }
    
    let htmlContent = `
        <div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative;">
            <div class="${extraClass}" style="position: relative; width: ${size}; height: ${size};">
                <img src="${imgSrc}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: ${border}; box-sizing: border-box;">
                <div class="petal-container" id="petals-${containerId}" style="display: ${needsPetals ? 'block' : 'none'};"></div>
            </div>
        </div>
    `;
    container.innerHTML = htmlContent;
    
    // Create animated sakura petals dynamically
    if (needsPetals) {
        setTimeout(() => createPetals(`petals-${containerId}`, size), 1000);
    }
}

function renderDaruma(state, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    let imgSrc = '';
    let size = containerId === 'demo-daruma' ? '150px' : '120px';
    let animClass = state === 0 ? 'daruma-wobble-drop' : 'daruma-wobble-idle';
    
    if (state === 0) imgSrc = "{{ url_for('static', filename='img/daruma_blank.png') }}";
    else if (state === 1) imgSrc = "{{ url_for('static', filename='img/daruma_left_eye.png') }}";
    else imgSrc = "{{ url_for('static', filename='img/daruma_full_eyes.png') }}";
    
    // Animate drop-in for new empty daruma.
    container.innerHTML = `
        <div class="${animClass}" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative;">
            <!-- Main Daruma Image -->
            <img src="${imgSrc}" style="height: ${size}; object-fit: contain; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2)); position: absolute; z-index: 1;">
            
            ${state === 1 ? `
                <!-- Animate Eye popping in for State 1 -->
                <div style="position: absolute; z-index: 2; width: ${size}; height: ${size}; display: flex; justify-content: center; align-items: center;">
                    <div style="width: 12%; height: 12%; background-color: #111; border-radius: 50%; position: absolute; left: 33%; top: 43%; transform: scale(0); animation: popEye 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.5) 1.5s forwards;"></div>
                </div>
            ` : ''}

            ${state === 2 ? `
                <!-- Animate Eyes popping in for State 2 -->
                <div style="position: absolute; z-index: 2; width: ${size}; height: ${size}; display: flex; justify-content: center; align-items: center;">
                    <div style="width: 12%; height: 12%; background-color: #111; border-radius: 50%; position: absolute; left: 33%; top: 43%; transform: scale(0); animation: popEye 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.5) 1.0s forwards;"></div>
                    <div style="width: 12%; height: 12%; background-color: #111; border-radius: 50%; position: absolute; right: 33%; top: 43%; transform: scale(0); animation: popEye 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.5) 1.8s forwards;"></div>
                </div>
            ` : ''}

            <style>
                @keyframes fade-in-anim { 0% { opacity: 0; } 100% { opacity: 1; } }
                .fade-in-anim { animation: fade-in-anim 1s ease forwards; opacity: 0; }
                @keyframes popEye { 0% { transform: scale(0); } 100% { transform: scale(1); } }
            </style>
        </div>
    `;
}

function createPetals(containerId, parentSizeStr) {
    const parent = document.getElementById(containerId);
    if (!parent) return;
    
    // Constant shower of petals
    setInterval(() => {
        const petal = document.createElement('div');
        petal.className = 'petal';
        // random small size
        petal.style.width = Math.random() * 8 + 6 + 'px';
        petal.style.height = Math.random() * 8 + 6 + 'px';
        // random position horizontally
        petal.style.left = Math.random() * 80 + 10 + '%';
        // animation times
        petal.style.animationDuration = Math.random() * 3 + 3 + 's';
        
        parent.appendChild(petal);
        
        // cleanup
        setTimeout(() => petal.remove(), 7000);
    }, 300); // New petal every 300ms
}
</script>
