{% extends "base.html" %}
{% block title %}深夜陪讀室{% endblock %}
{% block content %}
<style>
    .lofi-container-bg {
        background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('{{ url_for("static", filename="img/yukine_lofi.png") }}');
        background-size: cover;
        background-position: center;
        min-height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        padding: 2rem;
        border-radius: 20px;
        margin: 1rem;
        position: relative;
        overflow: hidden;
    }
</style>
<div class="lofi-container lofi-container-bg">
    
    <!-- Soft Glow Overlay -->
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle, rgba(181, 155, 142, 0.1) 0%, rgba(0,0,0,0) 70%); pointer-events: none;"></div>

    <div class="lofi-header" style="text-align: center; margin-bottom: 2rem; z-index: 1;">
        <h1 style="font-family: 'Outfit', sans-serif; font-size: 3rem; margin-bottom: 0.5rem; text-shadow: 0 0 20px rgba(181, 155, 142, 0.5);">深夜陪讀室</h1>
        <p style="font-size: 1.2rem; opacity: 0.8;">雪音老師正在安靜地陪著你學習... (๑´ㅂ`๑)</p>
    </div>

    <div class="lofi-main" style="display: flex; gap: 3rem; align-items: center; z-index: 1; flex-wrap: wrap; justify-content: center;">
        <!-- Yukine Study Image -->
        <div class="yukine-frame" style="width: 400px; height: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(181, 155, 142, 0.3); border: 1px solid rgba(255,255,255,0.1); position: relative;">
            <img src="{{ url_for('static', filename='img/yukine_lofi.png') }}" style="width: 100%; height: 100%; object-fit: cover;">
            <div style="position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; backdrop-filter: blur(5px);">
                <i class="fa-solid fa-moon"></i> 晚安，加油
            </div>
        </div>

        <!-- Music Controller -->
        <div class="music-card" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 2rem; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 350px; text-align: center;">
            <h3 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-music"></i> 專注音效</h3>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                <button onclick="toggleAudio('lofi')" class="audio-btn" id="lofi-btn">
                    <i class="fa-solid fa-headphones"></i> Lofi 比特
                </button>
                <button onclick="toggleAudio('rain')" class="audio-btn" id="rain-btn">
                    <i class="fa-solid fa-cloud-showers-heavy"></i> 雨聲
                </button>
                <button onclick="toggleAudio('cafe')" class="audio-btn" id="cafe-btn">
                    <i class="fa-solid fa-coffee"></i> 咖啡廳
                </button>
                <button onclick="toggleAudio('forest')" class="audio-btn" id="forest-btn">
                    <i class="fa-solid fa-tree"></i> 森林
                </button>
            </div>
            
            <!-- Hidden Audio Elements -->
            <audio id="audio-lofi" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>
            <audio id="audio-rain" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" style="display: none;"></audio> <!-- Mock URL, real site would use better -->
            
            <div style="margin-top: 2rem;">
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" style="width: 100%; cursor: pointer;">
                <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.6;">音量控制</p>
            </div>

            <a href="{{ url_for('main.home') }}" style="display: block; margin-top: 1.5rem; color: #fff; text-decoration: none; font-size: 0.9rem; opacity: 0.5; transition: opacity 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">
                <i class="fa-solid fa-arrow-left"></i> 返回主頁面
            </a>
        </div>
    </div>
</div>

<script>
    const audios = {
        lofi: document.getElementById('audio-lofi'),
        rain: document.getElementById('audio-rain'),
        // Add more if needed
    };

    function toggleAudio(type) {
        const audio = audios[type];
        if (!audio) {
            alert("此音效目前不可用，正在尋找高品質音源中...");
            return;
        }

        const btn = document.getElementById(type + '-btn');
        if (audio.paused) {
            // Stop others? Maybe layering is better for lofi + rain
            audio.play();
            btn.classList.add('active');
        } else {
            audio.pause();
            btn.classList.remove('active');
        }
    }

    document.getElementById('volume-slider').addEventListener('input', (e) => {
        Object.values(audios).forEach(a => a.volume = e.target.value);
    });
</script>

<style>
    .audio-btn {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
    }
    .audio-btn:hover {
        background: rgba(255,255,255,0.2);
        transform: translateY(-2px);
    }
    .audio-btn.active {
        background: var(--color-primary);
        border-color: var(--color-primary);
        box-shadow: 0 0 15px var(--color-primary);
    }
    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.02); opacity: 1; }
        100% { transform: scale(1); opacity: 0.8; }
    }
    .yukine-frame {
        animation: pulse 10s infinite ease-in-out;
    }
</style>
{% endblock %}
