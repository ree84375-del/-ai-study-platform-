{% extends "base.html" %}
{% block title %}深夜陪讀室{% endblock %}
{% block content %}
<style>
    .lofi-container-bg {
        min-height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        padding: 2rem;
        border-radius: 20px;
        margin: 1rem;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
    }

    /* Animated Background Layer */
    .lofi-container-bg::before {
        content: '';
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        background-image: linear-gradient(rgba(10, 10, 20, 0.7), rgba(5, 5, 10, 0.95)),
        url('{{ url_for("static", filename="img/yukine_lofi.png") }}');
        background-size: cover;
        background-position: center;
        animation: bgKenBurns 30s ease-in-out infinite alternate;
        z-index: 0;
    }

    @keyframes bgKenBurns {
        0% {
            transform: scale(1) translate(0, 0);
        }
        33% {
            transform: scale(1.06) translate(-5px, -3px);
        }
        66% {
            transform: scale(1.03) translate(3px, -2px);
        }
        100% {
            transform: scale(1.07) translate(-2px, 2px);
        }
    }

    /* Floating Particles Effect */
    .particles-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 1;
        background-image:
            radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 2%),
            radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 3%);
        background-size: 100px 100px, 150px 150px;
        animation: drift 60s linear infinite;
        opacity: 0.6;
    }

    @keyframes drift {
        from {
            background-position: 0 0, 0 0;
        }

        to {
            background-position: -500px 500px, 500px -500px;
        }
    }
</style>
<div class="lofi-container lofi-container-bg">

    <!-- Soft Glow Overlay & Particles -->
    <div
        style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 30% 50%, rgba(181, 155, 142, 0.15) 0%, rgba(0,0,0,0) 60%); pointer-events: none; z-index: 1;">
    </div>
    <div class="particles-layer"></div>

    <!-- Background Shooting Stars -->
    <div class="bg-stars-layer">
        <div class="bg-shooting-star star1"></div>
        <div class="bg-shooting-star star2"></div>
        <div class="bg-shooting-star star3"></div>
        <!-- Twinkling Stars -->
        <div class="twinkle-star" style="top: 12%; left: 8%;"></div>
        <div class="twinkle-star" style="top: 6%; left: 45%; animation-delay: 1.5s;"></div>
        <div class="twinkle-star" style="top: 18%; left: 72%; animation-delay: 3s;"></div>
        <div class="twinkle-star" style="top: 8%; left: 88%; animation-delay: 0.8s;"></div>
        <div class="twinkle-star" style="top: 25%; left: 25%; animation-delay: 2.2s;"></div>
        <div class="twinkle-star" style="top: 15%; left: 60%; animation-delay: 4s;"></div>
        <div class="twinkle-star" style="top: 30%; left: 92%; animation-delay: 1s;"></div>
        <div class="twinkle-star" style="top: 5%; left: 15%; animation-delay: 3.5s;"></div>
    </div>

    <div class="lofi-header" style="text-align: center; margin-bottom: 2rem; z-index: 1;">
        <h1
            style="font-family: 'Outfit', sans-serif; font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 0 0 25px rgba(181, 155, 142, 0.6); letter-spacing: 2px;">
            深夜陪讀室</h1>
        <p style="font-size: 1.2rem; opacity: 0.8; font-weight: 300;">雪音老師正在安靜地陪著你學習... (๑´ㅂ`๑)🎶</p>
    </div>

    <div class="lofi-main"
        style="display: flex; gap: 4rem; align-items: center; z-index: 1; flex-wrap: wrap; justify-content: center;">

        <!-- Yukine Study Image -->
        <div class="yukine-frame" id="yukine-frame"
            style="width: 420px; height: 420px; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.6), 0 0 40px rgba(181, 155, 142, 0.2); border: 1px solid rgba(255,255,255,0.05); position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out;">
            <div class="yukine-image-wrapper" style="width: 100%; height: 100%; position: relative;">
                <!-- Floating Background Dust/Stars -->
                <div class="ambient-dust"
                    style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; background-image: radial-gradient(circle at center, rgba(255, 255, 255, 0.5) 0%, transparent 2%); background-size: 50px 50px; animation: floatDust 20s linear infinite; mix-blend-mode: screen; opacity: 0.2; transform: translateZ(-20px);">
                </div>

                <img src="{{ url_for('static', filename='img/yukine_lofi.png') }}"
                    style="width: 100%; height: 100%; object-fit: cover;">



                <!-- Environmental Animations Overlay -->
                <!-- Coffee Steam -->
                <div class="coffee-steam"
                    style="position: absolute; bottom: 18%; left: 34%; width: 30px; height: 50px; pointer-events: none; transform: translateZ(20px);">
                    <div class="steam s1"></div>
                    <div class="steam s2"></div>
                </div>

                <!-- Cat Snoring Zzz -->
                <div class="cat-zzz"
                    style="position: absolute; bottom: 35%; left: 28%; pointer-events: none; color: rgba(255,255,255,0.8); font-family: 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8); transform: translateZ(10px);">
                    z
                </div>
                <div class="cat-zzz z2"
                    style="position: absolute; bottom: 35%; left: 28%; pointer-events: none; color: rgba(255,255,255,0.8); font-family: 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8); transform: translateZ(10px);">
                    z
                </div>

                <!-- Lamp Glow Flicker -->
                <div class="lamp-glow"
                    style="position: absolute; top: 40%; left: 25%; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255, 235, 160, 0.25) 0%, transparent 60%); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%) translateZ(30px); mix-blend-mode: screen;">
                </div>

                <!-- Window Shooting Star -->
                <div
                    style="position: absolute; top: 5%; left: 35%; width: 120px; height: 120px; overflow: hidden; pointer-events: none; border-radius: 10px; transform: translateZ(-10px);">
                    <div class="shooting-star"></div>
                </div>
            </div>

            <!-- Dynamic Overlay on Image -->
            <div
                style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 65%, rgba(0,0,0,0.9)); pointer-events: none; transform: translateZ(40px);">
            </div>

            <div
                style="position: absolute; bottom: 25px; right: 25px; background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); color: #e0e0e0; transform: translateZ(50px);">
                <i class="fa-solid fa-moon"></i> 保持專注，晚安
            </div>
        </div>

        <!-- Music Controller -->
        <div class="music-card"
            style="background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 2.5rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
            <h3 style="margin-bottom: 2rem; font-weight: 400; letter-spacing: 1px; color: #f0f0f0;">
                <i class="fa-solid fa-headphones-simple" style="margin-right: 8px; color: var(--color-accent);"></i>
                專注音效
            </h3>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;">
                <button onclick="toggleAudio('lofi')" class="audio-btn" id="lofi-btn">
                    <i class="fa-solid fa-compact-disc feature-icon"></i>
                    <span>Lofi Beats</span>
                </button>
                <button onclick="toggleAudio('rain')" class="audio-btn" id="rain-btn">
                    <i class="fa-solid fa-cloud-rain feature-icon"></i>
                    <span>綿綿細雨</span>
                </button>
                <button onclick="toggleAudio('cafe')" class="audio-btn" id="cafe-btn">
                    <i class="fa-solid fa-mug-hot feature-icon"></i>
                    <span>咖啡廳</span>
                </button>
                <button onclick="toggleAudio('forest')" class="audio-btn" id="forest-btn">
                    <i class="fa-solid fa-leaf feature-icon"></i>
                    <span>深夜森林</span>
                </button>
            </div>

            <!-- Real Ambient Audio Sources -->
            <audio id="audio-lofi" loop
                src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3"></audio>
            <!-- High quality rain sound -->
            <audio id="audio-rain" loop
                src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=heavy-rain-nature-sounds-8186.mp3"></audio>
            <!-- Coffee shop chatter -->
            <audio id="audio-cafe" loop
                src="https://cdn.pixabay.com/download/audio/2021/09/06/audio_22822a16d8.mp3?filename=cafe-background-noise-12185.mp3"></audio>
            <!-- Forest crickets -->
            <audio id="audio-forest" loop
                src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_6bbbda27aa.mp3?filename=crickets-at-night-nature-sounds-8304.mp3"></audio>

            <div style="margin-top: 2.5rem; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 0.8rem; opacity: 0.6;"><i class="fa-solid fa-volume-low"></i></span>
                    <span style="font-size: 0.8rem; opacity: 0.6;"><i class="fa-solid fa-volume-high"></i></span>
                </div>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5"
                    style="width: 100%; cursor: pointer; accent-color: var(--color-accent);">
            </div>

            <a href="{{ url_for('main.home') }}"
                style="display: inline-block; margin-top: 2rem; color: #fff; text-decoration: none; font-size: 0.95rem; opacity: 0.6; transition: all 0.3s; padding: 8px 20px; border-radius: 20px; border: 1px solid transparent;"
                onmouseover="this.style.opacity='1'; this.style.border='1px solid rgba(255,255,255,0.2)';"
                onmouseout="this.style.opacity='0.6'; this.style.border='1px solid transparent';">
                <i class="fa-solid fa-arrow-left"></i> 離開房間
            </a>
        </div>
    </div>
</div>

<script>
    const audios = {
        lofi: document.getElementById('audio-lofi'),
        rain: document.getElementById('audio-rain'),
        cafe: document.getElementById('audio-cafe'),
        forest: document.getElementById('audio-forest')
    };

    function toggleAudio(type) {
        const audio = audios[type];
        if (!audio) return;

        const btn = document.getElementById(type + '-btn');
        if (audio.paused) {
            // Exclusive playback: Stop other audios if playing
            Object.keys(audios).forEach(key => {
                if (key !== type) {
                    audios[key].pause();
                    const otherBtn = document.getElementById(key + '-btn');
                    if (otherBtn) {
                        otherBtn.classList.remove('active');
                        otherBtn.querySelector('i').style.animation = 'none';
                    }
                }
            });

            audio.play().catch(e => {
                console.warn("Audio playback prevented by auto-play policy until interaction:", e);
                // Removed alert() to prevent annoying popups on browser blocks
            });
            btn.classList.add('active');

            // Add playing animation to icon
            const icon = btn.querySelector('i');
            icon.style.animation = 'iconBounce 1s infinite alternate';
        } else {
            audio.pause();
            btn.classList.remove('active');
            const icon = btn.querySelector('i');
            icon.style.animation = 'none';
        }
    }

    // Set initial volume
    const defaultVolume = 0.5;
    Object.values(audios).forEach(a => {
        if (a) a.volume = defaultVolume;
    });

    document.getElementById('volume-slider').addEventListener('input', (e) => {
        Object.values(audios).forEach(a => {
            if (a) a.volume = e.target.value;
        });
    });

    // 3D Parallax Tilt Effect
    const container = document.querySelector('.lofi-container');
    const frame = document.getElementById('yukine-frame');

    container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        // Calculate mouse position relative to center of the container
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        // Calculate rotation percentage (-1 to 1)
        const percentX = (x - centerX) / centerX;
        const percentY = (y - centerY) / centerY;

        // Max rotation degrees
        const maxTilt = 12;

        // Note: rotateX corresponds to moving mouse up/down (Y axis), rotateY is left/right (X axis)
        // We invert percentY so moving mouse UP tilts image UP
        const tiltX = -(percentY * maxTilt);
        const tiltY = (percentX * maxTilt);

        frame.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`;
        frame.style.transition = 'transform 0.1s ease-out'; // Fast follow

        // Pause "breathing" animation while interacting
        frame.style.animationPlayState = 'paused';
    });

    container.addEventListener('mouseleave', () => {
        // Reset to original position
        frame.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        frame.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';

        // Resume breathing animation
        frame.style.animationPlayState = 'running';
    });
</script>

<style>
    /* Premium Button Styling */
    .audio-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ddd;
        padding: 18px 10px;
        border-radius: 18px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
        font-weight: 500;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .audio-btn .feature-icon {
        font-size: 1.5rem;
        opacity: 0.8;
        transition: all 0.3s ease;
    }

    .audio-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-3px);
        color: white;
    }

    .audio-btn.active {
        background: rgba(181, 155, 142, 0.2);
        border-color: rgba(181, 155, 142, 0.6);
        color: white;
        box-shadow: 0 0 20px rgba(181, 155, 142, 0.3), inset 0 0 10px rgba(181, 155, 142, 0.1);
    }

    .audio-btn.active .feature-icon {
        color: var(--color-accent);
        opacity: 1;
        text-shadow: 0 0 10px var(--color-accent);
    }

    @keyframes iconBounce {
        0% {
            transform: scale(1);
        }

        100% {
            transform: scale(1.15);
        }
    }

    /* Mascot Lifelike Animation — subtle & organic */
    @keyframes breathing {
        0%, 100% {
            filter: brightness(1);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6), 0 0 40px rgba(181, 155, 142, 0.2);
        }
        50% {
            filter: brightness(1.03);
            box-shadow: 0 18px 55px rgba(0,0,0,0.55), 0 0 50px rgba(181, 155, 142, 0.25);
        }
    }

    @keyframes gentleSway {
        0%, 100% {
            transform: scale(1) translateY(0);
        }
        50% {
            transform: scale(1.012) translateY(-1.5px);
        }
    }

    @keyframes floatDust {
        0% {
            background-position: 0px 0px;
        }

        100% {
            background-position: 50px 100px;
        }
    }



    .yukine-frame {
        animation: breathing 8s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    .yukine-image-wrapper {
        animation: gentleSway 6s infinite ease-in-out;
        transform-origin: center bottom;
    }

    input[type=range] {
        -webkit-appearance: none;
        appearance: none;
        background: rgba(255, 255, 255, 0.1);
        height: 6px;
        border-radius: 3px;
    }

    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: white;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    /* Environmental Animations */
    /* Coffee Steam */
    .steam {
        position: absolute;
        width: 6px;
        height: 18px;
        background: #fff;
        border-radius: 50%;
        filter: blur(4px);
        opacity: 0;
    }

    .steam.s1 {
        left: 5px;
        animation: steamRise 3s infinite ease-in;
    }

    .steam.s2 {
        right: 5px;
        animation: steamRise 3.5s infinite ease-in 1.5s;
    }

    @keyframes steamRise {
        0% {
            transform: translateY(10px) scaleX(1);
            opacity: 0;
        }

        40% {
            opacity: 0.5;
        }

        100% {
            transform: translateY(-40px) scaleX(2);
            opacity: 0;
        }
    }

    /* Cat Snoring Zzz */
    .cat-zzz {
        animation: snore 4s infinite linear;
        opacity: 0;
    }

    .cat-zzz.z2 {
        animation: snore 4s infinite linear 2s;
    }

    @keyframes snore {
        0% {
            transform: translate(0, 0) scale(0.5);
            opacity: 0;
        }

        30% {
            opacity: 0.7;
        }

        100% {
            transform: translate(15px, -30px) scale(1.5);
            opacity: 0;
        }
    }

    /* Lamp Glow */
    .lamp-glow {
        animation: lampFlicker 4s infinite alternate ease-in-out;
    }

    @keyframes lampFlicker {

        0%,
        100% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        50% {
            opacity: 0.7;
            transform: translate(-50%, -50%) scale(1.05);
        }

        80% {
            opacity: 0.9;
            transform: translate(-50%, -50%) scale(0.95);
        }
    }

    /* Shooting Star */
    .shooting-star {
        position: absolute;
        top: -20px;
        right: -20px;
        width: 2px;
        height: 40px;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 1));
        transform: rotate(45deg);
        animation: shootingStarAnim 12s infinite linear;
        opacity: 0;
    }

    @keyframes shootingStarAnim {
        0% {
            transform: translate(0, 0) rotate(45deg);
            opacity: 1;
        }

        5% {
            transform: translate(-150px, 150px) rotate(45deg);
            opacity: 0;
        }

        100% {
            opacity: 0;
        }
    }

    /* ===== Background Shooting Stars & Twinkling ===== */
    .bg-stars-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
    }

    .bg-shooting-star {
        position: absolute;
        width: 2px;
        height: 60px;
        background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.9));
        border-radius: 50%;
        filter: blur(0.5px);
        opacity: 0;
    }

    .bg-shooting-star.star1 {
        top: 5%;
        right: 15%;
        transform: rotate(35deg);
        animation: bgShoot1 8s infinite linear 2s;
    }

    .bg-shooting-star.star2 {
        top: 10%;
        right: 40%;
        transform: rotate(42deg);
        animation: bgShoot2 12s infinite linear 6s;
    }

    .bg-shooting-star.star3 {
        top: 3%;
        right: 65%;
        transform: rotate(30deg);
        animation: bgShoot3 15s infinite linear 10s;
    }

    @keyframes bgShoot1 {
        0% { transform: translate(0, 0) rotate(35deg); opacity: 0; }
        1% { opacity: 1; }
        4% { transform: translate(-200px, 200px) rotate(35deg); opacity: 0; }
        100% { opacity: 0; }
    }

    @keyframes bgShoot2 {
        0% { transform: translate(0, 0) rotate(42deg); opacity: 0; }
        1% { opacity: 0.8; }
        3% { transform: translate(-250px, 180px) rotate(42deg); opacity: 0; }
        100% { opacity: 0; }
    }

    @keyframes bgShoot3 {
        0% { transform: translate(0, 0) rotate(30deg); opacity: 0; }
        0.5% { opacity: 0.9; }
        2.5% { transform: translate(-180px, 220px) rotate(30deg); opacity: 0; }
        100% { opacity: 0; }
    }

    /* Twinkling Stars */
    .twinkle-star {
        position: absolute;
        width: 3px;
        height: 3px;
        background: white;
        border-radius: 50%;
        animation: twinkle 4s ease-in-out infinite;
        box-shadow: 0 0 6px 1px rgba(255, 255, 255, 0.6);
    }

    @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.3); }
    }
</style>
{% endblock %}
