{% extends "base.html" %}
{% block title %}深夜陪讀室{% endblock %}
{% block content %}
<style>
    .lofi-container-bg {
        background-image: linear-gradient(rgba(10, 10, 20, 0.7), rgba(5, 5, 10, 0.95)),
        url('{{ url_for("static", filename="img/yukine_lofi.png") }}');
        background-size: cover;
        background-position: center;
        min-height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        padding: 2rem;
        border-radius: 20px;
        margin: 1rem;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
    }

    /* Floating Particles Effect */
    .particles-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        background-image:
            radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 2%),
            radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 3%);
        background-size: 100px 100px, 150px 150px;
        animation: drift 60s linear infinite;
        opacity: 0.6;
    }

    @keyframes drift {
        from {
            background-position: 0 0, 0 0;
        }

        to {
            background-position: -500px 500px, 500px -500px;
        }
    }
</style>
<div class="lofi-container lofi-container-bg">

    <!-- Soft Glow Overlay & Particles -->
    <div
        style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 30% 50%, rgba(181, 155, 142, 0.15) 0%, rgba(0,0,0,0) 60%); pointer-events: none;">
    </div>
    <div class="particles-layer"></div>

    <div class="lofi-header" style="text-align: center; margin-bottom: 2rem; z-index: 1;">
        <h1
            style="font-family: 'Outfit', sans-serif; font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 0 0 25px rgba(181, 155, 142, 0.6); letter-spacing: 2px;">
            深夜陪讀室</h1>
        <p style="font-size: 1.2rem; opacity: 0.8; font-weight: 300;">雪音老師正在安靜地陪著你學習... (๑´ㅂ`๑)🎶</p>
    </div>

    <div class="lofi-main"
        style="display: flex; gap: 4rem; align-items: center; z-index: 1; flex-wrap: wrap; justify-content: center;">

        <!-- Yukine Study Image -->
        <div class="yukine-frame"
            style="width: 420px; height: 420px; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.6), 0 0 40px rgba(181, 155, 142, 0.2); border: 1px solid rgba(255,255,255,0.05); position: relative;">

            <div class="yukine-image-wrapper" style="width: 100%; height: 100%; position: relative;">
                <img src="{{ url_for('static', filename='img/yukine_lofi.png') }}"
                    style="width: 100%; height: 100%; object-fit: cover;">

                <!-- Environmental Animations Overlay -->
                <!-- Coffee Steam -->
                <div class="coffee-steam"
                    style="position: absolute; bottom: 18%; left: 34%; width: 30px; height: 50px; pointer-events: none;">
                    <div class="steam s1"></div>
                    <div class="steam s2"></div>
                </div>

                <!-- Cat Snoring Zzz -->
                <div class="cat-zzz"
                    style="position: absolute; bottom: 35%; left: 28%; pointer-events: none; color: rgba(255,255,255,0.8); font-family: 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8);">
                    z
                </div>
                <div class="cat-zzz z2"
                    style="position: absolute; bottom: 35%; left: 28%; pointer-events: none; color: rgba(255,255,255,0.8); font-family: 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8);">
                    z
                </div>

                <!-- Lamp Glow Flicker -->
                <div class="lamp-glow"
                    style="position: absolute; top: 40%; left: 25%; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255, 235, 160, 0.25) 0%, transparent 60%); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); mix-blend-mode: screen;">
                </div>

                <!-- Window Shooting Star -->
                <div
                    style="position: absolute; top: 5%; left: 35%; width: 120px; height: 120px; overflow: hidden; pointer-events: none; border-radius: 10px;">
                    <div class="shooting-star"></div>
                </div>
            </div>

            <!-- Dynamic Overlay on Image -->
            <div
                style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 65%, rgba(0,0,0,0.9)); pointer-events: none;">
            </div>

            <div
                style="position: absolute; bottom: 25px; right: 25px; background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); color: #e0e0e0;">
                <i class="fa-solid fa-moon"></i> 保持專注，晚安
            </div>
        </div>

        <!-- Music Controller -->
        <div class="music-card"
            style="background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 2.5rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
            <h3 style="margin-bottom: 2rem; font-weight: 400; letter-spacing: 1px; color: #f0f0f0;">
                <i class="fa-solid fa-headphones-simple" style="margin-right: 8px; color: var(--color-accent);"></i>
                專注音效
            </h3>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;">
                <button onclick="toggleAudio('lofi')" class="audio-btn" id="lofi-btn">
                    <i class="fa-solid fa-compact-disc feature-icon"></i>
                    <span>Lofi Beats</span>
                </button>
                <button onclick="toggleAudio('rain')" class="audio-btn" id="rain-btn">
                    <i class="fa-solid fa-cloud-rain feature-icon"></i>
                    <span>綿綿細雨</span>
                </button>
                <button onclick="toggleAudio('cafe')" class="audio-btn" id="cafe-btn">
                    <i class="fa-solid fa-mug-hot feature-icon"></i>
                    <span>咖啡廳</span>
                </button>
                <button onclick="toggleAudio('forest')" class="audio-btn" id="forest-btn">
                    <i class="fa-solid fa-leaf feature-icon"></i>
                    <span>深夜森林</span>
                </button>
            </div>

            <!-- Real Ambient Audio Sources -->
            <audio id="audio-lofi" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>
            <!-- High quality rain sound -->
            <audio id="audio-rain" loop
                src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=heavy-rain-nature-sounds-8186.mp3"></audio>
            <!-- Coffee shop chatter -->
            <audio id="audio-cafe" loop
                src="https://cdn.pixabay.com/download/audio/2021/09/06/audio_22822a16d8.mp3?filename=cafe-background-noise-12185.mp3"></audio>
            <!-- Forest crickets -->
            <audio id="audio-forest" loop
                src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_6bbbda27aa.mp3?filename=crickets-at-night-nature-sounds-8304.mp3"></audio>

            <div style="margin-top: 2.5rem; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 0.8rem; opacity: 0.6;"><i class="fa-solid fa-volume-low"></i></span>
                    <span style="font-size: 0.8rem; opacity: 0.6;"><i class="fa-solid fa-volume-high"></i></span>
                </div>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5"
                    style="width: 100%; cursor: pointer; accent-color: var(--color-accent);">
            </div>

            <a href="{{ url_for('main.home') }}"
                style="display: inline-block; margin-top: 2rem; color: #fff; text-decoration: none; font-size: 0.95rem; opacity: 0.6; transition: all 0.3s; padding: 8px 20px; border-radius: 20px; border: 1px solid transparent;"
                onmouseover="this.style.opacity='1'; this.style.border='1px solid rgba(255,255,255,0.2)';"
                onmouseout="this.style.opacity='0.6'; this.style.border='1px solid transparent';">
                <i class="fa-solid fa-arrow-left"></i> 離開房間
            </a>
        </div>
    </div>
</div>

<script>
    const audios = {
        lofi: document.getElementById('audio-lofi'),
        rain: document.getElementById('audio-rain'),
        cafe: document.getElementById('audio-cafe'),
        forest: document.getElementById('audio-forest')
    };

    function toggleAudio(type) {
        const audio = audios[type];
        if (!audio) return;

        const btn = document.getElementById(type + '-btn');
        if (audio.paused) {
            // We allow layering! User can play rain AND lofi together.
            audio.play().catch(e => {
                console.error("Audio playback failed:", e);
                alert("瀏覽器阻擋了自動播放功能，或音源連結暫時失效。");
            });
            btn.classList.add('active');

            // Add playing animation to icon
            const icon = btn.querySelector('i');
            icon.style.animation = 'iconBounce 1s infinite alternate';
        } else {
            audio.pause();
            btn.classList.remove('active');
            const icon = btn.querySelector('i');
            icon.style.animation = 'none';
        }
    }

    // Set initial volume
    const defaultVolume = 0.5;
    Object.values(audios).forEach(a => {
        if (a) a.volume = defaultVolume;
    });

    document.getElementById('volume-slider').addEventListener('input', (e) => {
        Object.values(audios).forEach(a => {
            if (a) a.volume = e.target.value;
        });
    });
</script>

<style>
    /* Premium Button Styling */
    .audio-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ddd;
        padding: 18px 10px;
        border-radius: 18px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
        font-weight: 500;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .audio-btn .feature-icon {
        font-size: 1.5rem;
        opacity: 0.8;
        transition: all 0.3s ease;
    }

    .audio-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-3px);
        color: white;
    }

    .audio-btn.active {
        background: rgba(181, 155, 142, 0.2);
        border-color: rgba(181, 155, 142, 0.6);
        color: white;
        box-shadow: 0 0 20px rgba(181, 155, 142, 0.3), inset 0 0 10px rgba(181, 155, 142, 0.1);
    }

    .audio-btn.active .feature-icon {
        color: var(--color-accent);
        opacity: 1;
        text-shadow: 0 0 10px var(--color-accent);
    }

    @keyframes iconBounce {
        0% {
            transform: scale(1);
        }

        100% {
            transform: scale(1.15);
        }
    }

    /* Mascot Lifelike Animation */
    @keyframes breathing {
        0% {
            transform: scale(1) translateY(0);
            filter: brightness(1);
        }

        50% {
            transform: scale(1.02) translateY(-8px);
            filter: brightness(1.05);
        }

        100% {
            transform: scale(1) translateY(0);
            filter: brightness(1);
        }
    }

    @keyframes gentleSway {
        0% {
            transform: rotate(-1.5deg);
        }

        50% {
            transform: rotate(1.5deg);
        }

        100% {
            transform: rotate(-1.5deg);
        }
    }

    .yukine-frame {
        animation: breathing 6s infinite ease-in-out;
    }

    .yukine-image-wrapper {
        animation: gentleSway 8s infinite ease-in-out;
        transform-origin: bottom center;
    }

    input[type=range] {
        -webkit-appearance: none;
        background: rgba(255, 255, 255, 0.1);
        height: 6px;
        border-radius: 3px;
    }

    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: white;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    /* Environmental Animations */
    /* Coffee Steam */
    .steam {
        position: absolute;
        width: 6px;
        height: 18px;
        background: #fff;
        border-radius: 50%;
        filter: blur(4px);
        opacity: 0;
    }

    .steam.s1 {
        left: 5px;
        animation: steamRise 3s infinite ease-in;
    }

    .steam.s2 {
        right: 5px;
        animation: steamRise 3.5s infinite ease-in 1.5s;
    }

    @keyframes steamRise {
        0% {
            transform: translateY(10px) scaleX(1);
            opacity: 0;
        }

        40% {
            opacity: 0.5;
        }

        100% {
            transform: translateY(-40px) scaleX(2);
            opacity: 0;
        }
    }

    /* Cat Snoring Zzz */
    .cat-zzz {
        animation: snore 4s infinite linear;
        opacity: 0;
    }

    .cat-zzz.z2 {
        animation: snore 4s infinite linear 2s;
    }

    @keyframes snore {
        0% {
            transform: translate(0, 0) scale(0.5);
            opacity: 0;
        }

        30% {
            opacity: 0.7;
        }

        100% {
            transform: translate(15px, -30px) scale(1.5);
            opacity: 0;
        }
    }

    /* Lamp Glow */
    .lamp-glow {
        animation: lampFlicker 4s infinite alternate ease-in-out;
    }

    @keyframes lampFlicker {

        0%,
        100% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        50% {
            opacity: 0.7;
            transform: translate(-50%, -50%) scale(1.05);
        }

        80% {
            opacity: 0.9;
            transform: translate(-50%, -50%) scale(0.95);
        }
    }

    /* Shooting Star */
    .shooting-star {
        position: absolute;
        top: -20px;
        right: -20px;
        width: 2px;
        height: 40px;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 1));
        transform: rotate(45deg);
        animation: shootingStarAnim 12s infinite linear;
        opacity: 0;
    }

    @keyframes shootingStarAnim {
        0% {
            transform: translate(0, 0) rotate(45deg);
            opacity: 1;
        }

        5% {
            transform: translate(-150px, 150px) rotate(45deg);
            opacity: 0;
        }

        100% {
            opacity: 0;
        }
    }
</style>
{% endblock %}
