{% extends "base.html" %}
{% block title %}深夜陪讀室{% endblock %}
{% block content %}
<style>
    .lofi-container-bg {
        min-height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        padding: 2rem;
        border-radius: 20px;
        margin: 1rem;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
    }

    /* Animated Background Layer */
    .lofi-container-bg::before {
        content: '';
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        background-image: linear-gradient(rgba(10, 10, 20, 0.4), rgba(5, 5, 10, 0.7)),
        url('{{ url_for("static", filename="img/yukine_scene_night.png") }}');
        background-size: cover;
        background-position: center;
        animation: bgKenBurns 30s ease-in-out infinite alternate;
        z-index: 0;
        transition: background-image 2s ease-in-out;
    }

    .lofi-container-bg.morning::before {
        background-image: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0)),
        url('{{ url_for("static", filename="img/yukine_scene_morning.png") }}');
    }
    .lofi-container-bg.afternoon::before {
        background-image: linear-gradient(rgba(255, 255, 255, 0.05), rgba(181, 155, 142, 0.1)),
        url('{{ url_for("static", filename="img/yukine_scene_afternoon.png") }}');
    }
    .lofi-container-bg.dusk::before {
        background-image: linear-gradient(rgba(221, 122, 86, 0.1), rgba(0, 0, 0, 0.3)),
        url('{{ url_for("static", filename="img/yukine_scene_dusk.png") }}');
    }
    .lofi-container-bg.night::before {
        background-image: linear-gradient(rgba(10, 10, 20, 0.5), rgba(5, 5, 10, 0.8)),
        url('{{ url_for("static", filename="img/yukine_scene_night.png") }}');
    }

    @keyframes bgKenBurns {
        0% {
            transform: scale(1) translate(0, 0);
        }
        33% {
            transform: scale(1.06) translate(-5px, -3px);
        }
        66% {
            transform: scale(1.03) translate(3px, -2px);
        }
        100% {
            transform: scale(1.07) translate(-2px, 2px);
        }
    }

    /* Floating Particles Effect */
    .particles-layer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 1;
        background-image:
            radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 2%),
            radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 3%);
        background-size: 100px 100px, 150px 150px;
        animation: drift 60s linear infinite;
        opacity: 0.6;
    }

    @keyframes drift {
        from {
            background-position: 0 0, 0 0;
        }

        to {
            background-position: -500px 500px, 500px -500px;
        }
    }
</style>
<div class="lofi-container lofi-container-bg">

    <!-- Soft Glow Overlay & Particles -->
    <div
        style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 30% 50%, rgba(181, 155, 142, 0.15) 0%, rgba(0,0,0,0) 60%); pointer-events: none; z-index: 1;">
    </div>
    <div class="particles-layer"></div>

    <!-- Background Shooting Stars -->
    <div class="bg-stars-layer">
        <div class="bg-shooting-star star1"></div>
        <div class="bg-shooting-star star2"></div>
        <div class="bg-shooting-star star3"></div>
        <!-- Twinkling Stars -->
        <div class="twinkle-star" style="top: 12%; left: 8%;"></div>
        <div class="twinkle-star" style="top: 6%; left: 45%; animation-delay: 1.5s;"></div>
        <div class="twinkle-star" style="top: 18%; left: 72%; animation-delay: 3s;"></div>
        <div class="twinkle-star" style="top: 8%; left: 88%; animation-delay: 0.8s;"></div>
        <div class="twinkle-star" style="top: 25%; left: 25%; animation-delay: 2.2s;"></div>
        <div class="twinkle-star" style="top: 15%; left: 60%; animation-delay: 4s;"></div>
        <div class="twinkle-star" style="top: 30%; left: 92%; animation-delay: 1s;"></div>
        <div class="twinkle-star" style="top: 5%; left: 15%; animation-delay: 3.5s;"></div>
    </div>

    <div class="lofi-header" style="text-align: center; margin-bottom: 2rem; z-index: 1;">
        <h1 id="study-room-title"
            style="font-family: 'Outfit', sans-serif; font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 0 0 25px rgba(181, 155, 142, 0.6); letter-spacing: 2px;">
            深夜陪讀室</h1>
        <p id="study-room-subtitle" style="font-size: 1.2rem; opacity: 0.8; font-weight: 300;">雪音老師正在安靜地陪著你學習... (๑´ㅂ`๑)🎶</p>
    </div>

    <div class="lofi-main"
        style="display: flex; gap: 4rem; align-items: center; z-index: 1; flex-wrap: wrap; justify-content: center;">

        <!-- Yukine Study Image -->
        <div class="yukine-frame" id="yukine-frame"
            style="width: 420px; height: 420px; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.6), 0 0 40px rgba(181, 155, 142, 0.2); border: 1px solid rgba(255,255,255,0.05); position: relative; transform-style: preserve-3d; transition: transform 0.1s ease-out;">
            <div class="yukine-image-wrapper" style="width: 100%; height: 100%; position: relative;">
                <!-- Floating Background Dust/Stars -->
                <div class="ambient-dust"
                    style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; background-image: radial-gradient(circle at center, rgba(255, 255, 255, 0.5) 0%, transparent 2%); background-size: 50px 50px; animation: floatDust 20s linear infinite; mix-blend-mode: screen; opacity: 0.2; transform: translateZ(-20px);">
                </div>

                <!-- Daytime Sparkles (Sunlight) -->
                <div id="daytime-sparkles"
                    style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; overflow: hidden; display: none;">
                    <div class="sparkle sp1" style="top: 20%; left: 30%;"></div>
                    <div class="sparkle sp2" style="top: 40%; left: 60%; animation-delay: 1s;"></div>
                    <div class="sparkle sp3" style="top: 70%; left: 20%; animation-delay: 2s;"></div>
                </div>

                <img id="yukine-main-img" src="{{ url_for('static', filename='img/yukine_scene_night.png') }}"
                    style="width: 100%; height: 100%; object-fit: cover; transition: opacity 1s;">



                <!-- Environmental Animations Overlay -->
                <!-- Coffee Steam -->
                <div class="coffee-steam" id="coffee-steam"
                    style="position: absolute; bottom: 18%; right: 20%; width: 30px; height: 50px; pointer-events: none; transform: translateZ(20px);">
                    <div class="steam s1"></div>
                    <div class="steam s2"></div>
                </div>

                <!-- Cat/Sleepy Zzz -->
                <div class="cat-zzz" id="cat-zzz"
                    style="position: absolute; bottom: 44%; left: 16%; pointer-events: none; color: rgba(255,255,255,0.8); font-family: 'Comic Sans MS', cursive, sans-serif; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8); transform: translateZ(10px);">
                    z
                </div>
                <div class="cat-zzz z2" id="cat-zzz-2"
                    style="position: absolute; bottom: 44%; left: 16%; pointer-events: none; color: rgba(255,255,255,0.8); font-family: 'Comic Sans MS', cursive, sans-serif; font-size: 12px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8); transform: translateZ(10px);">
                    z
                </div>

                <!-- Lamp Glow Flicker -->
                <div class="lamp-glow" id="lamp-glow"
                    style="position: absolute; top: 42%; right: 28%; width: 140px; height: 140px; background: radial-gradient(circle, rgba(255, 235, 160, 0.3) 0%, transparent 70%); border-radius: 50%; pointer-events: none; transform: translate(50%, -50%) translateZ(30px); mix-blend-mode: screen;">
                </div>

                <!-- Window Shooting Star -->
                <div id="window-shooting-star"
                    style="position: absolute; top: 10%; right: 40%; width: 120px; height: 120px; overflow: hidden; pointer-events: none; border-radius: 10px; transform: translateZ(-10px);">
                    <div class="shooting-star"></div>
                </div>
            </div>

            <!-- Dynamic Overlay on Image -->
            <div
                style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 65%, rgba(0,0,0,0.9)); pointer-events: none; transform: translateZ(40px);">
            </div>

            <div id="time-status-badge"
                style="position: absolute; bottom: 25px; right: 25px; background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); color: #e0e0e0; transform: translateZ(50px);">
                <i class="fa-solid fa-moon"></i> 保持專注，晚安
            </div>
        </div>

        <!-- Right Side Controls (Music + Timer) -->
        <div style="display: flex; flex-direction: column; gap: 2rem; z-index: 10;">

            <!-- Time-of-Day Switcher -->
            <div class="switcher-card"
                style="background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 1.5rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
                <h3 style="margin-bottom: 1rem; font-weight: 400; letter-spacing: 1px; color: #f0f0f0; font-size: 1.1rem;">
                    <i class="fa-solid fa-cloud-moon" style="margin-right: 8px; color: #a5d6ff;"></i>
                    切換時段氛圍
                </h3>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <button onclick="setManualTheme('morning')" class="time-btn" id="btn-morning">
                        <i class="fa-solid fa-sun" style="color: #ffde6a;"></i> 早上
                    </button>
                    <button onclick="setManualTheme('afternoon')" class="time-btn" id="btn-afternoon">
                        <i class="fa-solid fa-cloud-sun" style="color: #ff9e6a;"></i> 下午
                    </button>
                    <button onclick="setManualTheme('dusk')" class="time-btn" id="btn-dusk">
                        <i class="fa-solid fa-mountain-sun" style="color: #ff7b72;"></i> 黃昏
                    </button>
                    <button onclick="setManualTheme('night')" class="time-btn" id="btn-night">
                        <i class="fa-solid fa-moon" style="color: #d2a8ff;"></i> 晚上
                    </button>
                </div>
                <button onclick="resetAutoTheme()" style="margin-top: 15px; background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; transition: all 0.3s;">
                    <i class="fa-solid fa-clock-rotate-left"></i> 回復自動切換
                </button>
            </div>
            
            <!-- Pomodoro Timer -->
            <div class="pomodoro-card"
                style="background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 2rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
                <h3 style="margin-bottom: 1.5rem; font-weight: 400; letter-spacing: 1px; color: #f0f0f0;">
                    <i class="fa-regular fa-clock" style="margin-right: 8px; color: #ff7b72;"></i>
                    極致番茄鐘
                </h3>
                
                <div style="font-size: 4.5rem; font-weight: 300; font-family: 'Courier New', Courier, monospace; color: white; letter-spacing: 5px; margin-bottom: 1rem; text-shadow: 0 0 20px rgba(255,255,255,0.3);" id="timer-display">
                    25:00
                </div>

                <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 1.5rem;">
                    <button onclick="setTimer(25)" class="pomo-mode-btn active" id="mode-focus" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 15px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s;">專注 (25)</button>
                    <button onclick="setTimer(5)" class="pomo-mode-btn" id="mode-break" style="background: transparent; color: rgba(255,255,255,0.6); border: 1px solid transparent; border-radius: 20px; padding: 5px 15px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s;">短休息 (5)</button>
                </div>

                <div style="display: flex; justify-content: center; gap: 20px;">
                    <button onclick="toggleTimer()" id="timer-toggle-btn" style="width: 50px; height: 50px; border-radius: 50%; background: #ff7b72; color: white; border: none; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255, 123, 114, 0.4); transition: transform 0.2s;">
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <button onclick="resetTimer()" style="width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
            </div>

        <!-- Music Controller -->
        <div class="music-card"
            style="background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 2.5rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
            <h3 style="margin-bottom: 2rem; font-weight: 400; letter-spacing: 1px; color: #f0f0f0;">
                <i class="fa-solid fa-headphones-simple" style="margin-right: 8px; color: var(--color-accent);"></i>
                專注音效
            </h3>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;">
                <button onclick="toggleAudio('lofi')" class="audio-btn" id="lofi-btn">
                    <i class="fa-solid fa-compact-disc feature-icon"></i>
                    <span>Lofi Beats</span>
                </button>
                <button onclick="toggleAudio('rain')" class="audio-btn" id="rain-btn">
                    <i class="fa-solid fa-cloud-rain feature-icon"></i>
                    <span>綿綿細雨</span>
                </button>
                <button onclick="toggleAudio('cafe')" class="audio-btn" id="cafe-btn">
                    <i class="fa-solid fa-mug-hot feature-icon"></i>
                    <span>咖啡廳</span>
                </button>
                <button onclick="toggleAudio('forest')" class="audio-btn" id="forest-btn">
                    <i class="fa-solid fa-leaf feature-icon"></i>
                    <span>深夜森林</span>
                </button>
            </div>

            <!-- Real Ambient Audio Sources -->
            <audio id="audio-lofi" loop
                src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3"></audio>
            <!-- High quality rain sound -->
            <audio id="audio-rain" loop
                src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=heavy-rain-nature-sounds-8186.mp3"></audio>
            <!-- Coffee shop chatter -->
            <audio id="audio-cafe" loop
                src="https://cdn.pixabay.com/download/audio/2021/09/06/audio_22822a16d8.mp3?filename=cafe-background-noise-12185.mp3"></audio>
            <!-- Forest crickets -->
            <audio id="audio-forest" loop
                src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_6bbbda27aa.mp3?filename=crickets-at-night-nature-sounds-8304.mp3"></audio>

            <div style="margin-top: 2.5rem; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 0.8rem; opacity: 0.6;"><i class="fa-solid fa-volume-low"></i></span>
                    <span style="font-size: 0.8rem; opacity: 0.6;"><i class="fa-solid fa-volume-high"></i></span>
                </div>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5"
                    style="width: 100%; cursor: pointer; accent-color: var(--color-accent);">
            </div>

            <a href="{{ url_for('main.home') }}"
                style="display: inline-block; margin-top: 2rem; color: #fff; text-decoration: none; font-size: 0.95rem; opacity: 0.6; transition: all 0.3s; padding: 8px 20px; border-radius: 20px; border: 1px solid transparent;"
                onmouseover="this.style.opacity='1'; this.style.border='1px solid rgba(255,255,255,0.2)';"
                onmouseout="this.style.opacity='0.6'; this.style.border='1px solid transparent';">
                <i class="fa-solid fa-arrow-left"></i> 離開房間
            </a>
        </div>
        
        </div> <!-- End Right Side Controls -->
    </div>
</div>

    <script>
        // --- Dynamic Time-of-Day Logic ---
        let isManualOverride = false;

        function setManualTheme(theme) {
            isManualOverride = true;
            applyLofiRoomTheme(theme);
            
            // Highlight active button
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + theme);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function resetAutoTheme() {
            isManualOverride = false;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            updateTimeTheme();
        }

        function updateTimeTheme() {
            if (isManualOverride) return;
            const hour = new Date().getHours();
            let theme;

            if (hour >= 6 && hour < 12) theme = 'morning';
            else if (hour >= 12 && hour < 17) theme = 'afternoon';
            else if (hour >= 17 && hour < 19) theme = 'dusk';
            else theme = 'night';

            applyLofiRoomTheme(theme);
        }

        function applyLofiRoomTheme(theme) {
            const container = document.querySelector('.lofi-container-bg');
            const mainImg = document.getElementById('yukine-main-img');
            const title = document.getElementById('study-room-title');
            const subtitle = document.getElementById('study-room-subtitle');
            const badge = document.getElementById('time-status-badge');
            const starsLayer = document.querySelector('.bg-stars-layer');
            
            // Environmental Animation Elements
            const lamp = document.getElementById('lamp-glow');
            const steam = document.getElementById('coffee-steam');
            const zzz1 = document.getElementById('cat-zzz');
            const zzz2 = document.getElementById('cat-zzz-2');
            const shootingStar = document.getElementById('window-shooting-star');
            
            // Daytime Sparkles
            const sparkles = document.getElementById('daytime-sparkles');
            
            let imageSrc, titleText, subtitleText, badgeHTML;

            // Default Visibility
            if (lamp) lamp.style.display = 'none';
            if (zzz1) zzz1.style.display = 'none';
            if (zzz2) zzz2.style.display = 'none';
            if (shootingStar) shootingStar.style.display = 'none';
            if (sparkles) sparkles.style.display = 'none';
            if (steam) steam.style.display = 'block'; // Steam always on for cozy vibes

            if (theme === 'morning') {
                imageSrc = "{{ url_for('static', filename='img/yukine_scene_morning.png') }}";
                titleText = "早安陪讀室";
                subtitleText = "早晨的陽光真好，雪音老師陪你開啟新的一天！ (☀️^‿^)";
                badgeHTML = '<i class="fa-solid fa-sun"></i> 每日計畫，加油';
                if (starsLayer) starsLayer.style.display = 'none';
                if (sparkles) sparkles.style.display = 'block';
            } else if (theme === 'afternoon') {
                imageSrc = "{{ url_for('static', filename='img/yukine_scene_afternoon.png') }}";
                titleText = "午後陪讀室";
                subtitleText = "稍微休息一下，喝杯茶再繼續努力吧。 (🍵´ω`)";
                badgeHTML = '<i class="fa-solid fa-cloud-sun"></i> 專注時光，午安';
                if (starsLayer) starsLayer.style.display = 'none';
                if (sparkles) sparkles.style.display = 'block';
            } else if (theme === 'dusk') {
                imageSrc = "{{ url_for('static', filename='img/yukine_scene_dusk.png') }}";
                titleText = "黃昏陪讀室";
                subtitleText = "夕陽好美，今天的你也辛苦了呢。 (🌇´∀`)";
                badgeHTML = '<i class="fa-solid fa-mountain-sun"></i> 溫溫晚霞，舒心';
                if (starsLayer) starsLayer.style.display = 'block';
                if (lamp) {
                    lamp.style.display = 'block';
                    lamp.style.background = 'radial-gradient(circle, rgba(255, 200, 100, 0.4) 0%, transparent 70%)';
                }
                if (zzz1) zzz1.style.display = 'block';
                if (zzz2) zzz2.style.display = 'block';
            } else {
                imageSrc = "{{ url_for('static', filename='img/yukine_scene_night.png') }}";
                titleText = "深夜陪讀室";
                subtitleText = "雪音老師正在安靜地陪著你學習... (๑´ㅂ`๑)🎶";
                badgeHTML = '<i class="fa-solid fa-moon"></i> 保持專注，晚安';
                if (starsLayer) starsLayer.style.display = 'block';
                if (lamp) {
                    lamp.style.display = 'block';
                    lamp.style.background = 'radial-gradient(circle, rgba(255, 235, 160, 0.3) 0%, transparent 70%)';
                }
                if (zzz1) zzz1.style.display = 'block';
                if (zzz2) zzz2.style.display = 'block';
                if (shootingStar) shootingStar.style.display = 'block';
            }

            if (container) container.className = 'lofi-container lofi-container-bg ' + theme;
            if (mainImg) mainImg.src = imageSrc;
            if (title) title.innerText = titleText;
            if (subtitle) subtitle.innerText = subtitleText;
            if (badge) badge.innerHTML = badgeHTML;
        }

        updateTimeTheme();
        // Check every minute
        setInterval(updateTimeTheme, 60000);

        // --- Audio Controls ---
        const audios = {
            lofi: document.getElementById('audio-lofi'),
            rain: document.getElementById('audio-rain'),
            cafe: document.getElementById('audio-cafe'),
            forest: document.getElementById('audio-forest')
        };

        function toggleAudio(type) {
            const audio = audios[type];
            if (!audio) return;

            const btn = document.getElementById(type + '-btn');
            if (audio.paused) {
                // Exclusive playback: Stop other audios if playing
                Object.keys(audios).forEach(key => {
                    if (key !== type) {
                        audios[key].pause();
                        const otherBtn = document.getElementById(key + '-btn');
                        if (otherBtn) {
                            otherBtn.classList.remove('active');
                            const icon = otherBtn.querySelector('i');
                            if (icon) icon.style.animation = 'none';
                        }
                    }
                });

                audio.play().then(() => {
                    btn.classList.add('active');
                    audio.volume = document.getElementById('volume-slider').value;
                    const icon = btn.querySelector('i');
                    if (icon) icon.style.animation = 'pulse 2s infinite ease-in-out';
                }).catch(e => {
                    console.warn("Audio playback prevented by auto-play policy until interaction:", e);
                });
            } else {
                audio.pause();
                btn.classList.remove('active');
                const icon = btn.querySelector('i');
                if (icon) icon.style.animation = 'none';
            }
        }

        document.getElementById('volume-slider').addEventListener('input', (e) => {
            const vol = e.target.value;
            Object.values(audios).forEach(audio => {
                if (audio) audio.volume = vol;
            });
        });

        // --- Pomodoro Timer Logic ---
        let timerInterval;
        let timeLeft = 25 * 60; // 25 minutes default
        let isRunning = false;
        let currentMode = 25;

        const display = document.getElementById('timer-display');
        const toggleBtn = document.getElementById('timer-toggle-btn');
        const focusBtn = document.getElementById('mode-focus');
        const breakBtn = document.getElementById('mode-break');

        function updateDisplay() {
            if (!display) return;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function setTimer(minutes) {
            clearInterval(timerInterval);
            isRunning = false;
            currentMode = minutes;
            timeLeft = minutes * 60;
            updateDisplay();
            if (toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            
            // Update styling
            if(minutes === 25) {
                if (focusBtn) {
                    focusBtn.style.background = 'rgba(255,255,255,0.1)';
                    focusBtn.style.border = '1px solid rgba(255,255,255,0.2)';
                    focusBtn.style.color = 'white';
                }
                if (breakBtn) {
                    breakBtn.style.background = 'transparent';
                    breakBtn.style.border = '1px solid transparent';
                    breakBtn.style.color = 'rgba(255,255,255,0.6)';
                }
            } else {
                if (breakBtn) {
                    breakBtn.style.background = 'rgba(255,255,255,0.1)';
                    breakBtn.style.border = '1px solid rgba(255,255,255,0.2)';
                    breakBtn.style.color = 'white';
                }
                if (focusBtn) {
                    focusBtn.style.background = 'transparent';
                    focusBtn.style.border = '1px solid transparent';
                    focusBtn.style.color = 'rgba(255,255,255,0.6)';
                }
            }
        }

        function toggleTimer() {
            if(isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            } else {
                isRunning = true;
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if(timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        if (toggleBtn) toggleBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                        // Optional: play an alert bell here
                        if ('speechSynthesis' in window) {
                            let msg = new SpeechSynthesisUtterance('時間到囉！辛苦了！');
                            msg.lang = 'zh-TW';
                            window.speechSynthesis.speak(msg);
                        }
                        timeLeft = currentMode * 60; // Auto reset text
                        updateDisplay();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            setTimer(currentMode);
        }
        
        // Initial setup
        applyLofiRoomTheme('night'); // Default
        
        // --- 3D Parallax Tilt Effect ---
        document.addEventListener('DOMContentLoaded', () => {
            updateDisplay();
            const container = document.querySelector('.lofi-container');
            const frame = document.getElementById('yukine-frame');

            if (container && frame) {
                container.addEventListener('mousemove', (e) => {
                    const rect = container.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const percentX = (x - centerX) / centerX;
                    const percentY = (y - centerY) / centerY;

                    const maxTilt = 12;
                    const tiltX = -(percentY * maxTilt);
                    const tiltY = (percentX * maxTilt);

                    frame.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`;
                    frame.style.transition = 'transform 0.1s ease-out';
                    frame.style.animationPlayState = 'paused';
                });

                container.addEventListener('mouseleave', () => {
                    frame.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                    frame.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
                    frame.style.animationPlayState = 'running';
                });
            }
        });
    </script>
